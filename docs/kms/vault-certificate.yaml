apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-server-tls
  namespace: vault
spec:
  secretName: vault-server-tls
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - vault
    - vault.vault
    - vault.vault.svc
    - vault.vault.svc.cluster.local
    - vault-internal
    - vault-internal.vault
    - vault-internal.vault.svc
    - vault-internal.vault.svc.cluster.local
  issuerRef:
    name: simplyblock-certificate-authority-issuer
    kind: ClusterIssuer
