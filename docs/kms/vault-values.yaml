global:
  openshift: true
  tlsDisable: false

server:
  dataStorage:
    storageClass: ssd-csi

  extraEnvironmentVars:
    VAULT_CACERT: /vault/tls/ca.crt

  volumes:
    - name: tls-cert
      secret:
        secretName: vault-server-tls

  volumeMounts:
    - name: tls-cert
      mountPath: /vault/tls
      readOnly: true

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable     = 0
        address         = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_cert_file   = "/vault/tls/tls.crt"
        tls_key_file    = "/vault/tls/tls.key"
        tls_min_version = "tls12"
      }

      storage "file" {
        path = "/vault/data"
      }

injector:
  enabled: false

# NOTE: The hashicorp/vault Helm chart does not support `extraObjects` (unlike
# openbao/openbao). Apply vault-certificate.yaml separately *before* installing
# the chart so the vault-server-tls secret exists when the pod starts.
