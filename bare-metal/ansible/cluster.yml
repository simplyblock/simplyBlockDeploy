- hosts: storage_nodes
  gather_facts: false
  remote_user: root
  any_errors_fatal: true

  vars:
    cleanup: "{{ cleanup | default(false) }}"

  tasks:
    - block:
        - name: Stop firewalls
          systemd_service:
            name: "{{ item }}"
            state: stopped
            enabled: false
          loop:
            - firewalld
            - ufw
          ignore_errors: true

        - name: Disable IPv6 during cleanup
          sysctl:
            name: "{{ item }}"
            value: "1"
            sysctl_set: true
            state: present
            reload: yes
          loop:
            - net.ipv6.conf.all.disable_ipv6
            - net.ipv6.conf.default.disable_ipv6
          ignore_errors: true

        - name: Run simplyblock cleanup if sbcli is present
          command: "{{ sbcli_command_name | default('sbcli') }} sn deploy-cleaner"
          ignore_errors: true

        - name: Stop and prune docker
          shell: |
            docker stop $(docker ps -aq) 2>/dev/null || true
            docker rm -f $(docker ps -aq) 2>/dev/null || true
            docker builder prune --all -f
            docker system prune -af
            docker volume prune -f
            docker rmi -f $(docker images -aq) 2>/dev/null || true
          args:
            executable: /bin/bash

        - name: Remove sbcli package if present
          pip:
            name: "{{ sbcli_package | default(sbcli_command_name | default('sbcli')) }}"
            state: absent
          ignore_errors: true

        - name: Remove sbcli binaries
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /usr/local/bin/sbc
            - /usr/local/bin/sbctl
            - /usr/local/bin/sbcli
            - /usr/local/lib/python3.9/site-packages/simplyblock_core
            - /usr/local/lib/python3.9/site-packages/simplyblock_cli
            - /usr/local/lib/python3.9/site-packages/simplyblock
            - /usr/local/lib/python3.9/site-packages/simplyblock_cli_dev
          ignore_errors: true

        - name: Reboot storage node after cleanup
          reboot:
            reboot_timeout: 600
      when: cleanup | bool


