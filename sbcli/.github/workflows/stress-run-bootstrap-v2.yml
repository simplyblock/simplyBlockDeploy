name: Bootstrap Cluster + Stress Run Until Failure (v2)
run-name: "Stress Bootstrap v2 | ${{ inputs.SBCLI_BRANCH }} | ${{ inputs.LAB_CONFIG_PROFILE }} | ${{ inputs.TEST_CLASS }}"

on:
  workflow_dispatch:
    inputs:
      # ── Lab profile ─────────────────────────────────────────────────────────
      LAB_CONFIG_PROFILE:
        description: >
          Lab config profile name — file at .github/lab-configs/<name>.json.
          Contains all node IPs, SSH details, NFS mount, and bootstrap params.
          Add a new lab by committing a new .github/lab-configs/<name>.json file.
        required: true
        default: "default"

      LAB_INFRA_OVERRIDE:
        description: >
          Optional JSON to override specific fields from the profile.
          Example: {"mnodes":"10.0.0.1","storage_ips":"10.0.0.2 10.0.0.3"}
        required: false
        default: ""

      BOOTSTRAP_CONFIG:
        description: >
          Optional JSON to override bootstrap params from the profile.
          Example: {"data_chunks":"1","parity_chunks":"0","cluster_extra_args":{"--flag":"val"}}
        required: false
        default: ""

      # ── Run-specific ─────────────────────────────────────────────────────────
      SBCLI_BRANCH:
        description: "sbcli repo branch to clone for tests"
        required: true
        default: "R25.10-Hotfix"

      CUSTOM_IMAGES:
        description: "Image overrides: set spdk and/or docker values, leave as \"\" to skip."
        default: 'spdk="" docker=""'
        required: false

      BOOTSTRAP_IS_SINGLE_NODE:
        description: "Bootstrap: deploy as single-node (--is-single-node)"
        type: boolean
        required: false
        default: false

      BOOTSTRAP_ENABLE_NODE_AFFINITY:
        description: "Bootstrap: enable node affinity (--enable-node-affinity)"
        type: boolean
        required: false
        default: false

      TEST_CLASS:
        description: "Stress test class name (--testname)"
        required: true
        default: "RandomMultiClientMultiFailoverTest"

      CLUSTER_SECURITY:
        description: "Cluster setup mode. 'backup' writes s3-backup.json and passes --use-backup to cluster create."
        required: false
        type: choice
        default: "none"
        options:
          - none
          - backup

concurrency:
  group: simplyblock-lab-stress-v2
  cancel-in-progress: false

jobs:
  bootstrap-and-stress:
    name: Pre-clean -> Bootstrap -> Stress
    runs-on: [self-hosted]
    timeout-minutes: 4320

    env:
      # Cluster/lab env — defaults overridden by "Resolve lab config" step for workflow_dispatch
      STORAGE_PRIVATE_IPS: '192.168.10.205 192.168.10.206 192.168.10.207 192.168.10.208'
      API_INVOKE_URL: 'http://192.168.10.211/'
      API_BASE_URL: 'http://192.168.10.211/'
      BASTION_IP: '192.168.10.211'
      BASTION_SERVER: '192.168.10.211'
      MNODES: '192.168.10.211'
      NR_HUGEPAGES: '2048'
      GRAFANA_ENDPOINT: 'http://192.168.10.211/grafana'
      SBCLI_CMD: 'sbctl'
      SBCLI_BRANCH: ${{ inputs.SBCLI_BRANCH || 'R25.10-Hotfix' }}

      # SSH/client env
      SSH_USER: 'root'
      KEY_PATH: '/home/ec2-user/.ssh/simplyblock-us-east-2.pem'
      CLIENTNODES: '192.168.10.165 192.168.10.166'
      CLIENT_IP: '192.168.10.165 192.168.10.166'

      # Cleanup
      NFS_MOUNTPOINT: '/mnt/nfs_share'

      # Bootstrap params
      BOOTSTRAP_MAX_LVOL: '300'
      BOOTSTRAP_DATA_CHUNKS: '2'
      BOOTSTRAP_PARITY_CHUNKS: '2'
      BOOTSTRAP_JOURNAL_PARTITION: '1'
      BOOTSTRAP_DATA_NIC: 'eth1'
      BOOTSTRAP_HA_JM_COUNT: '3'
      BOOTSTRAP_HA_TYPE: 'ha'

      # Stress derived from bootstrap chunks (overridden by Resolve step)
      NDCS: '2'
      NPCS: '2'
      TEST_CLASS: ${{ inputs.TEST_CLASS || 'RandomMultiClientMultiFailoverTest' }}
      CLUSTER_SECURITY: ${{ inputs.CLUSTER_SECURITY || 'none' }}

      # Secrets
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # Filled after bootstrap parsing
      CLUSTER_ID: ""
      CLUSTER_SECRET: ""

    steps:
      - name: Runner diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          whoami
          pwd
          python3 --version || true
          git --version

      - name: Clear stale test artifacts from previous run
        shell: bash
        run: |
          rm -f sbcli/e2e/output.log || true

      - name: Resolve lab config (profile + overrides)
        shell: bash
        env:
          LAB_CONFIG_PROFILE_INPUT: ${{ inputs.LAB_CONFIG_PROFILE }}
          LAB_INFRA_OVERRIDE_INPUT: ${{ inputs.LAB_INFRA_OVERRIDE }}
          BOOTSTRAP_CONFIG_INPUT: ${{ inputs.BOOTSTRAP_CONFIG }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, sys, subprocess, base64

          profile = os.environ.get('LAB_CONFIG_PROFILE_INPUT', '').strip()
          override_raw = os.environ.get('LAB_INFRA_OVERRIDE_INPUT', '').strip()
          bootstrap_raw = os.environ.get('BOOTSTRAP_CONFIG_INPUT', '').strip()

          if not profile:
              print("No LAB_CONFIG_PROFILE set — skipping profile resolution.")
              sys.exit(0)

          if '/' in profile or '\\' in profile or '..' in profile:
              print(f"ERROR: Invalid profile name: {profile!r}", file=sys.stderr)
              sys.exit(1)

          profile_path = f"sbcli/.github/lab-configs/{profile}.json"

          if os.path.isfile(profile_path):
              with open(profile_path) as f:
                  cfg = json.load(f)
              print(f"Loaded profile from: {profile_path}")
          else:
              repo = os.environ.get('GITHUB_REPOSITORY', '')
              ref  = os.environ.get('GITHUB_REF_NAME', '')
              print(f"sbcli/ not found locally — fetching from GitHub API ({repo}@{ref})")
              result = subprocess.run(
                  ['gh', 'api',
                   f'repos/{repo}/contents/.github/lab-configs/{profile}.json?ref={ref}',
                   '--jq', '.content'],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f"ERROR: Profile '{profile}' not found: {result.stderr}", file=sys.stderr)
                  sys.exit(1)
              cfg = json.loads(base64.b64decode(result.stdout.strip()).decode())
              print(f"Fetched profile via API: .github/lab-configs/{profile}.json@{ref}")

          if override_raw:
              try:
                  cfg.update(json.loads(override_raw))
                  print(f"Applied LAB_INFRA_OVERRIDE: {override_raw}")
              except Exception as e:
                  print(f"WARN: Could not parse LAB_INFRA_OVERRIDE: {e}")

          bsc = cfg.get('bootstrap', {})
          if bootstrap_raw:
              try:
                  bsc.update(json.loads(bootstrap_raw))
                  print(f"Applied BOOTSTRAP_CONFIG: {bootstrap_raw}")
              except Exception as e:
                  print(f"WARN: Could not parse BOOTSTRAP_CONFIG: {e}")

          mapping = {
              'MNODES':                      cfg.get('mnodes', ''),
              'STORAGE_PRIVATE_IPS':         cfg.get('storage_ips', ''),
              'CLIENTNODES':                 cfg.get('client_ips', ''),
              'CLIENT_IP':                   cfg.get('client_ips', ''),
              'BASTION_IP':                  cfg.get('bastion_ip', ''),
              'BASTION_SERVER':              cfg.get('bastion_ip', ''),
              'API_INVOKE_URL':              cfg.get('api_url', ''),
              'API_BASE_URL':                cfg.get('api_url', ''),
              'GRAFANA_ENDPOINT':            cfg.get('grafana', ''),
              'SSH_USER':                    cfg.get('ssh_user', ''),
              'KEY_PATH':                    cfg.get('key_path', ''),
              'NFS_MOUNTPOINT':              cfg.get('nfs_mount', ''),
              'NR_HUGEPAGES':                cfg.get('nr_hugepages', ''),
              'SBCLI_CMD':                   cfg.get('sbcli_cmd', ''),
              'BOOTSTRAP_MAX_LVOL':          bsc.get('max_lvol', ''),
              'BOOTSTRAP_DATA_CHUNKS':       bsc.get('data_chunks', ''),
              'BOOTSTRAP_PARITY_CHUNKS':     bsc.get('parity_chunks', ''),
              'BOOTSTRAP_JOURNAL_PARTITION': bsc.get('journal_partition', ''),
              'BOOTSTRAP_HA_JM_COUNT':       bsc.get('ha_jm_count', ''),
              'BOOTSTRAP_HA_TYPE':           bsc.get('ha_type', ''),
              'BOOTSTRAP_DATA_NIC':          bsc.get('data_nic', ''),
              'NDCS':                        bsc.get('data_chunks', ''),
              'NPCS':                        bsc.get('parity_chunks', ''),
              'BOOTSTRAP_CLUSTER_EXTRA_ARGS': json.dumps(bsc.get('cluster_extra_args', {})),
              'BOOTSTRAP_SN_EXTRA_ARGS':      json.dumps(bsc.get('sn_extra_args', {})),
          }

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              for k, v in mapping.items():
                  if v:
                      f.write(f"{k}={v}\n")

          print(f"Resolved profile: {profile}")
          for k, v in mapping.items():
              display = '***' if k == 'KEY_PATH' else v
              print(f"  {k}={display}")
          PY

      - name: Install prereqs (sshpass)
        shell: bash
        run: |
          set -euxo pipefail
          if command -v sshpass >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y sshpass
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y epel-release || true
            sudo yum install -y sshpass
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y sshpass
          else
            echo "ERROR: Cannot install sshpass (unknown package manager)."
            exit 1
          fi
      
      - name: Parse CUSTOM_IMAGES overrides
        shell: bash
        run: |
          set -euxo pipefail
          custom="${{ inputs.CUSTOM_IMAGES }}"
          for item in $custom; do
            key="${item%%=*}"
            value="${item#*=}"
            value="${value//\"/}"   # strip surrounding quotes
            if [[ -z "$value" ]]; then
              echo "Skipping $key (empty)"
              continue
            fi
            case "$key" in
              spdk)   echo "SIMPLY_BLOCK_SPDK_ULTRA_IMAGE=$value" >> "$GITHUB_ENV" ; echo "SPDK image set: $value" ;;
              docker) echo "SIMPLY_BLOCK_DOCKER_IMAGE=$value"     >> "$GITHUB_ENV" ; echo "Docker image set: $value" ;;
              *)      echo "Unknown image key: $key (ignored)" ;;
            esac
          done

      - name: Resolve KEY_PATH (handles .ssh/, ~/.ssh/, quoted ~) and validate key exists
        shell: bash
        run: |
          set -euxo pipefail

          kp="${KEY_PATH}"

          # Strip wrapping quotes if user typed "~/.ssh/..." with quotes
          kp="${kp%\"}"; kp="${kp#\"}"
          kp="${kp%\'}"; kp="${kp#\'}"

          # Normalize ".ssh/..." -> "$HOME/.ssh/..."
          if [[ "$kp" == .ssh/* ]]; then
            kp="${HOME}/${kp}"
          fi

          # Normalize "~/" -> "$HOME/"
          if [[ "$kp" == ~/* ]]; then
            kp="${HOME}/${kp#~/}"
          fi

          # Also handle "~.ssh/.." (unlikely, but safe)
          if [[ "$kp" == "~.ssh/"* ]]; then
            kp="${HOME}/.${kp#~.}"
          fi

          echo "Resolved KEY_PATH=$kp"
          echo "KEY_PATH=$kp" >> "$GITHUB_ENV"

          test -f "$kp" || (echo "ERROR: SSH key not found at $kp" && exit 1)
          chmod 600 "$kp" || true

      - name: Export KEY_NAME from KEY_PATH
        shell: bash
        run: |
          set -euxo pipefail
          # KEY_PATH is already resolved and exported to $GITHUB_ENV in previous step
          key_name="$(basename "${KEY_PATH}")"
          echo "KEY_NAME=${key_name}" >> "$GITHUB_ENV"
          echo "Exported KEY_NAME=${key_name}"

      - name: Validate required secrets exist
        shell: bash
        run: |
          set -euxo pipefail
          [[ -n "${SSH_PASSWORD}" ]] || (echo "ERROR: secrets.SSH_PASSWORD required" && exit 1)

      # ============================================================
      # PRE-BOOTSTRAP CLEANUP (remote ops only)
      # Targets = MNODES + STORAGE_PRIVATE_IPS + CLIENTNODES
      # ============================================================
      - name: Pre-clean kill fio/tmux and unmount NFS on MNODES + storage + clients
        shell: bash
        run: |
          set -euxo pipefail

          run_remote() {
            local ip="$1"
            local script="$2"
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@${ip}" "bash -s" <<< "$script"
          }

          run_remote_with_retry() {
            local ip="$1"
            local script="$2"
            local max=5
            for attempt in $(seq 1 $max); do
              run_remote "$ip" "$script" && return 0
              echo "Attempt $attempt/$max failed for $ip, retrying in 5s..."
              sleep 5
            done
            echo "All $max attempts failed for $ip, continuing..."
            return 0
          }

          targets="$MNODES $STORAGE_PRIVATE_IPS $CLIENTNODES"
          uniq_targets="$(echo "$targets" | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' ')"

          for ip in $uniq_targets; do
            echo "---- $ip: kill fio/tmux + umount ${NFS_MOUNTPOINT} ----"
            run_remote_with_retry "$ip" "set -euxo pipefail;
              pkill -9 fio || true;
              pkill -9 tmux || true;
              mp='${NFS_MOUNTPOINT}';
              if mountpoint -q \"\$mp\"; then umount -f \"\$mp\" || umount \"\$mp\"; else
                if mount | grep -q \" \$mp \"; then umount -f \"\$mp\" || umount \"\$mp\" || true; fi
              fi"
          done

      - name: Destroy/clean storage nodes (deploy-cleaner, docker prune, uninstall sbcli, k3s)
        shell: bash
        run: |
          set -euxo pipefail

          run_remote() {
            local ip="$1"
            local script="$2"
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@${ip}" "bash -s" <<< "$script"
          }

          targets="$MNODES $STORAGE_PRIVATE_IPS"
          uniq_targets="$(echo "$targets" | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' ')"

          for ip in $uniq_targets; do
            echo "---- storage destroy/clean: $ip ----"
            run_remote "$ip" "set -euxo pipefail;
              systemctl stop firewalld || true;
              systemctl stop ufw || true;
              sysctl -w net.ipv6.conf.all.disable_ipv6=1 || true;

              '${SBCLI_CMD}' sn deploy-cleaner || echo 'WARN: deploy-cleaner failed';

              docker stop \$(docker ps -aq) || true;
              docker rm -f \$(docker ps -aq) || true;
              docker builder prune --all -f || true;
              docker system prune -af || true;
              docker volume prune -f || true;
              docker rmi -f \$(docker images -aq) || true;

              pip uninstall -y '${SBCLI_CMD}' || echo 'WARN: uninstall sbcli failed';
              pip uninstall -y sbctl || echo 'WARN: uninstall sbctl failed';
              rm -rf /usr/local/bin/sbc* || true;
              k3s-agent-uninstall.sh || true"
            sleep 10
          done

      - name: Client cleanup disconnect lvols; ensure NFS not mounted anywhere; unmount all /mnt; remove /mnt dirs
        shell: bash
        run: |
          set -euxo pipefail

          run_remote() {
            local ip="$1"
            local script="$2"
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@${ip}" "bash -s" <<< "$script"
          }

          # disconnect lvol subsystems on clients
          for ip in $CLIENTNODES; do
            echo "---- client disconnect lvols: $ip ----"
            run_remote "$ip" "set -euxo pipefail;
              subsystems=\$(nvme list-subsys | grep -i lvol | awk '{print \$3}' | cut -d '=' -f 2 || true);
              for s in \$subsystems; do nvme disconnect -n \"\$s\" || true; done"
          done

          # fail if NFS still mounted anywhere
          targets="$MNODES $STORAGE_PRIVATE_IPS $CLIENTNODES"
          uniq_targets="$(echo "$targets" | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' ')"

          still=0
          for ip in $uniq_targets; do
            if sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${SSH_USER}@${ip}" \
              "mount | grep -q \" ${NFS_MOUNTPOINT} \""; then
              echo "ERROR: ${NFS_MOUNTPOINT} still mounted on $ip"
              still=1
            fi
          done
          [[ "$still" -eq 0 ]] || exit 1

          # unmount all /mnt and remove dirs on clients
          for ip in $CLIENTNODES; do
            echo "---- client unmount all /mnt and remove dirs: $ip ----"
            run_remote "$ip" "set -euxo pipefail;
              mps=\$(mount | grep ' /mnt' | awk '{print \$3}' || true);
              for mp in \$mps; do umount -f \"\$mp\" || umount \"\$mp\" || true; done;
              dirs=\$(find /mnt -mindepth 1 -type d 2>/dev/null || true);
              for d in \$dirs; do rm -rf \"\$d\" || true; done"
          done

      - name: Reboot storage nodes, wait online, disk reset + PCI rebind + mklabel
        shell: bash
        run: |
          set -euxo pipefail

          run_remote() {
            local ip="$1"
            local script="$2"
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@${ip}" "bash -s" <<< "$script"
          }

          # reboot storage nodes
          for ip in $STORAGE_PRIVATE_IPS; do
            echo "---- reboot storage: $ip ----"
            sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${SSH_USER}@${ip}" \
              "nohup reboot >/dev/null 2>&1 &" || true
          done

          # wait storage online
          for ip in $STORAGE_PRIVATE_IPS; do
            echo "Waiting for $ip..."
            for i in {1..60}; do
              if sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 "${SSH_USER}@${ip}" \
                "echo online" >/dev/null 2>&1; then
                echo "$ip online"
                break
              fi
              sleep 10
              [[ "$i" -lt 60 ]] || (echo "ERROR: $ip did not come online" && exit 1)
            done
          done

          # disk reset / PCI rebind / mklabel on storage nodes
          for ip in $STORAGE_PRIVATE_IPS; do
            echo "---- disk reset on $ip ----"
            run_remote "$ip" "set -euxo pipefail;
              for dev in /dev/nvme0n1 /dev/nvme1n1 /dev/nvme2n1 /dev/nvme3n1; do
                if [[ -b \$dev ]]; then
                  parted \$dev --script rm 1 || true;
                  parted \$dev --script rm 2 || true;
                  parted \$dev --script rm 3 || true;
                fi
              done;

              for pci in \$(lspci -D | grep 'QEMU NVM Express' | awk '{print \$1}' || true); do
                echo \$pci > /sys/bus/pci/drivers/nvme/unbind || true;
              done;

              for i in 2 3 4 5; do
                echo 0000:00:0\${i}.0 > /sys/bus/pci/drivers/uio_pci_generic/unbind || true;
              done;
              for i in 2 3 4 5; do
                echo 0000:00:0\${i}.0 > /sys/bus/pci/drivers/vfio-pci/unbind || true;
              done;

              for i in 2 3 4 5; do
                echo nvme > /sys/bus/pci/devices/0000:00:0\${i}.0/driver_override || true;
              done;
              for i in 2 3 4 5; do
                echo 0000:00:0\${i}.0 > /sys/bus/pci/drivers/nvme/bind || true;
              done;

              for i in 0 1 2 3; do
                dev=/dev/nvme\${i}n1;
                if [[ -b \$dev ]]; then
                  parted -fs \$dev mklabel gpt || true;
                fi
              done"
          done

      # ============================================================
      # BOOTSTRAP (runner only)
      # ============================================================
      - name: Clone simplyBlockDeploy (bootstrap repo)
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf simplyBlockDeploy
          git clone https://github.com/simplyblock-io/simplyBlockDeploy.git simplyBlockDeploy
          test -f simplyBlockDeploy/bare-metal/bootstrap-cluster.sh

      - name: Remove /etc/simplyblock on all nodes and verify it is gone
        shell: bash
        run: |
          set -euxo pipefail

          run_remote() {
            local ip="$1"
            local script="$2"
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@${ip}" "bash -s" <<< "$script"
          }

          targets="$MNODES $STORAGE_PRIVATE_IPS"
          uniq_targets="$(echo "$targets" | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' ')"

          for ip in $uniq_targets; do
            echo "---- removing /etc/simplyblock on $ip ----"
            run_remote "$ip" "rm -rf /etc/simplyblock || true"
          done

          # Verify the folder is actually gone on every node
          failed=0
          for ip in $uniq_targets; do
            if sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@${ip}" "test -e /etc/simplyblock"; then
              echo "ERROR: /etc/simplyblock still exists on ${ip}"
              failed=1
            else
              echo "OK: /etc/simplyblock is absent on ${ip}"
            fi
          done
          [[ "$failed" -eq 0 ]] || exit 1

      - name: Write cluster security/backup config to mgmt node
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${CLUSTER_SECURITY:-none}" == "none" || -z "${CLUSTER_SECURITY:-}" ]]; then
            echo "CLUSTER_SECURITY=none; skipping."
            exit 0
          fi
          mgmt_ip="$(echo "${MNODES}" | awk '{print $1}')"
          # --- host-sec block commented out (kept for reference) ---
          # if [[ "${CLUSTER_SECURITY}" == "host-sec" || "${CLUSTER_SECURITY}" == "host-sec+backup" ]]; then
          #   echo "Writing /root/host-sec.json to ${mgmt_ip}..."
          #   HOST_SEC_JSON='{"dhchap_digests":["sha256","sha384"],"dhchap_dhgroups":["ffdhe2048","ffdhe3072","ffdhe4096","ffdhe6144","ffdhe8192"]}'
          #   sshpass -p "${SSH_PASSWORD}" ssh \
          #     -o StrictHostKeyChecking=no \
          #     -o UserKnownHostsFile=/dev/null \
          #     "${SSH_USER}@${mgmt_ip}" \
          #     "echo '${HOST_SEC_JSON}' > /root/host-sec.json && echo 'Written:' && cat /root/host-sec.json"
          #   echo "EXTRA_CLUSTER_ARGS=${EXTRA_CLUSTER_ARGS} --host-sec /root/host-sec.json" >> "$GITHUB_ENV"
          #   echo "Appended --host-sec /root/host-sec.json to EXTRA_CLUSTER_ARGS"
          # fi
          if [[ "${CLUSTER_SECURITY}" == "backup" ]]; then
            echo "Writing /root/s3-backup.json to ${mgmt_ip}..."
            S3_BACKUP_JSON='{"access_key_id":"minioadmin","secret_access_key":"minioadmin","local_endpoint":"http://192.168.10.164:9000","snapshot_backups":true,"with_compression":false,"secondary_target":0,"local_testing":true}'
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@${mgmt_ip}" \
              "echo '${S3_BACKUP_JSON}' > /root/s3-backup.json && echo 'Written:' && cat /root/s3-backup.json"
            echo "EXTRA_CLUSTER_ARGS=${EXTRA_CLUSTER_ARGS} --use-backup /root/s3-backup.json" >> "$GITHUB_ENV"
            echo "Appended --use-backup /root/s3-backup.json to EXTRA_CLUSTER_ARGS"
          fi

      - name: Bootstrap cluster (all params are inputs; --spdk-image only if set)
        shell: bash
        run: |
          set -euxo pipefail
          cd simplyBlockDeploy/bare-metal
          chmod +x ./bootstrap-cluster.sh

          extra_args=()
          if [[ -n "${SIMPLY_BLOCK_SPDK_ULTRA_IMAGE-}" ]]; then
            extra_args+=( --spdk-image "${SIMPLY_BLOCK_SPDK_ULTRA_IMAGE}" )
          fi
          # Checkbox flags
          if [[ "${{ inputs.BOOTSTRAP_IS_SINGLE_NODE }}" == "true" ]]; then
            extra_args+=( --is-single-node true )
          fi

          if [[ "${{ inputs.BOOTSTRAP_ENABLE_NODE_AFFINITY }}" == "true" ]]; then
            extra_args+=( --enable-node-affinity true )
          fi

          # Expand cluster_extra_args from profile (JSON dict -> --key value pairs)
          _cluster_extra="${BOOTSTRAP_CLUSTER_EXTRA_ARGS:-}"
          if [[ -n "${_cluster_extra}" && "${_cluster_extra}" != "{}" ]]; then
            while IFS= read -r flag; do
              [[ -n "${flag}" ]] && extra_args+=( ${flag} )
            done < <(echo "${_cluster_extra}" | python3 -c 'import json,sys;d=json.load(sys.stdin);[print(k+(" "+str(v) if v else "")) for k,v in d.items()]')
          fi

          # Expand sn_extra_args from profile (JSON dict -> --key value pairs)
          _sn_extra="${BOOTSTRAP_SN_EXTRA_ARGS:-}"
          if [[ -n "${_sn_extra}" && "${_sn_extra}" != "{}" ]]; then
            while IFS= read -r flag; do
              [[ -n "${flag}" ]] && extra_args+=( ${flag} )
            done < <(echo "${_sn_extra}" | python3 -c 'import json,sys;d=json.load(sys.stdin);[print(k+(" "+str(v) if v else "")) for k,v in d.items()]')
          fi

          set +e
          ./bootstrap-cluster.sh \
            --sbcli-cmd "${SBCLI_CMD}" \
            --max-lvol "${BOOTSTRAP_MAX_LVOL}" \
            --data-chunks-per-stripe "${BOOTSTRAP_DATA_CHUNKS}" \
            --parity-chunks-per-stripe "${BOOTSTRAP_PARITY_CHUNKS}" \
            --journal-partition "${BOOTSTRAP_JOURNAL_PARTITION}" \
            --ha-jm-count "${BOOTSTRAP_HA_JM_COUNT}" \
            --ha-type "${BOOTSTRAP_HA_TYPE}" \
            --data-nics "${BOOTSTRAP_DATA_NIC}" \
            "${extra_args[@]}" | tee bootstrap.log
          rc=${PIPESTATUS[0]}
          set -e

          [[ "$rc" -eq 0 ]] || (echo "ERROR: bootstrap failed (rc=$rc)" && exit "$rc")

      - name: Fetch CLUSTER_ID and CLUSTER_SECRET from MNODES (sbcli)
        shell: bash
        run: |
          set -euxo pipefail

          # Use MNODES first IP
          mgmt_ip="$(echo "${MNODES}" | awk '{print $1}')"

          # SSH into mgmt and run sbcli
          ssh_common=(-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i "${KEY_PATH}")

          # Get cluster UUID (first row that looks like UUID)
          cluster_id="$(ssh "${ssh_common[@]}" "${SSH_USER}@${mgmt_ip}" \
            "${SBCLI_CMD} cluster list" | grep -Eo '[0-9a-fA-F]{8}-([0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12}' | head -n 1)"

          if [[ -z "${cluster_id}" ]]; then
            echo "ERROR: Could not extract cluster_id from '${SBCLI_CMD} cluster list' on ${mgmt_ip}"
            ssh "${ssh_common[@]}" "${SSH_USER}@${mgmt_ip}" "${SBCLI_CMD} cluster list" || true
            exit 1
          fi

          # Get cluster secret
          cluster_secret="$(ssh "${ssh_common[@]}" "${SSH_USER}@${mgmt_ip}" \
            "${SBCLI_CMD} cluster get-secret ${cluster_id}" | tr -d '\r' | tail -n 1 | xargs)"

          if [[ -z "${cluster_secret}" ]]; then
            echo "ERROR: Could not get cluster_secret from '${SBCLI_CMD} cluster get-secret ${cluster_id}' on ${mgmt_ip}"
            exit 1
          fi

          echo "CLUSTER_ID=${cluster_id}" >> "$GITHUB_ENV"
          echo "CLUSTER_SECRET=${cluster_secret}" >> "$GITHUB_ENV"

          echo "Fetched CLUSTER_ID=${cluster_id}"
          echo "Fetched CLUSTER_SECRET=***set***"

      # ============================================================
      # STRESS (runner only)
      # ============================================================
      - name: Clone sbcli repo (prefer same branch as workflow; fallback to SBCLI_BRANCH)
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf sbcli

          wf_branch="${{ github.ref_name }}"
          fallback_branch="${SBCLI_BRANCH}"

          echo "Workflow branch: $wf_branch"
          echo "Fallback sbcli branch: $fallback_branch"

          # Try workflow branch first
          if git ls-remote --heads https://github.com/simplyblock-io/sbcli.git "$wf_branch" | grep -q "$wf_branch"; then
            echo "Cloning sbcli on workflow branch: $wf_branch"
            git clone --branch "$wf_branch" --single-branch https://github.com/simplyblock-io/sbcli.git sbcli
          else
            echo "Branch '$wf_branch' not found in sbcli; cloning fallback branch: $fallback_branch"
            git clone --branch "$fallback_branch" --single-branch https://github.com/simplyblock-io/sbcli.git sbcli
          fi

          test -f sbcli/e2e/stress.py
          test -f sbcli/e2e/logs/cleanup.py

      - name: Install Python deps (best-effort)
        shell: bash
        run: |
          set -euxo pipefail
          python3 -m pip install --upgrade pip
          if [[ -f "sbcli/e2e/requirements.txt" ]]; then
            pip install -r sbcli/e2e/requirements.txt
          fi

      - name: Cleanup logs before stress
        shell: bash
        working-directory: sbcli/e2e
        run: |
          set -euxo pipefail
          python3 logs/cleanup.py
      
      - name: Set RUN_DIR_FILE
        shell: bash
        run: |
          echo "RUN_DIR_FILE=/tmp/sb_run_dir_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}.txt" >> "$GITHUB_ENV"

      - name: Record test start time
        shell: bash
        run: |
          set -euxo pipefail
          echo "TEST_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "TEST_START_HUMAN=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"

      - name: Run stress (foreground; runs until failure)
        shell: bash
        working-directory: sbcli/e2e
        run: |
          set -euxo pipefail
          python3 -u stress.py \
            --testname "${TEST_CLASS}" \
            --ndcs "${NDCS}" \
            --npcs "${NPCS}" \
            2>&1 | tee output.log

      - name: Post-test cleanup (kill tmux on mgmt/storage; kill fio on clients)
        if: always()
        shell: bash
        run: |
          set -euxo pipefail

          run_remote() {
            local ip="$1"
            local script="$2"
            ssh -i "${KEY_PATH}" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@${ip}" "bash -s" <<< "$script" || true
          }

          run_remote_with_retry() {
            local ip="$1"
            local script="$2"
            local max=5
            for attempt in $(seq 1 $max); do
              run_remote "$ip" "$script" && return 0
              echo "Attempt $attempt/$max failed for $ip, retrying in 5s..."
              sleep 5
            done
            echo "All $max attempts failed for $ip, continuing..."
            return 0
          }

          for ip in $MNODES $STORAGE_PRIVATE_IPS; do
            echo "---- $ip: kill tmux ----"
            run_remote_with_retry "$ip" "pkill -9 tmux || true"
          done

          for ip in $CLIENTNODES; do
            echo "---- $ip: kill fio and tmux----"
            run_remote_with_retry "$ip" "pkill -9 fio || true"
            run_remote_with_retry "$ip" "pkill -9 tmux || true"
          done

      - name: Export RUN_BASE_DIR from RUN_DIR_FILE
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          test -f "${RUN_DIR_FILE}" || (echo "ERROR: RUN_DIR_FILE not found: ${RUN_DIR_FILE}" && exit 1)
          RUN_BASE_DIR="$(cat "${RUN_DIR_FILE}" | tr -d '\r\n')"
          test -n "${RUN_BASE_DIR}" || (echo "ERROR: RUN_BASE_DIR empty in ${RUN_DIR_FILE}" && exit 1)
          echo "RUN_BASE_DIR=${RUN_BASE_DIR}" >> "$GITHUB_ENV"
          echo "Detected RUN_BASE_DIR=${RUN_BASE_DIR}"

      - name: Mark test end time (always)
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          echo "TEST_END_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "TEST_END_HUMAN=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"

      - name: Collect Graylog/OpenSearch logs
        if: always()
        timeout-minutes: 240
        shell: bash
        run: |
          set +e
          [ -z "${TEST_START_EPOCH:-}" ] || [ -z "${TEST_END_EPOCH:-}" ] && exit 0
          ELAPSED=$((TEST_END_EPOCH - TEST_START_EPOCH))
          [ "${ELAPSED}" -le 0 ] && exit 0

          WINDOW_START=$((TEST_START_EPOCH - 3600))
          WINDOW_END=$((TEST_END_EPOCH + 3600))

          MGMT_IP="$(echo "${MNODES}" | awk '{print $1}')"
          SSH_OPTS=(-i "${KEY_PATH}" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10)

          OUTPUT_DIR=""
          if [ -n "${RUN_BASE_DIR:-}" ] && [ -d "${RUN_BASE_DIR}" ]; then
            OUTPUT_DIR="${RUN_BASE_DIR}/graylog_collected"
          else
            OUTPUT_DIR="${NFS_MOUNTPOINT:-/mnt/nfs_share}/graylog_collected-$(date -u '+%Y%m%d-%H%M%S')"
          fi
          mkdir -p "${OUTPUT_DIR}" 2>/dev/null || true

          epoch_to_iso() {
            python3 -c "from datetime import datetime,timezone; print(datetime.fromtimestamp($1,tz=timezone.utc).strftime('%Y-%m-%dT%H:%M:%S'))"
          }

          CHUNK=0; CURRENT=${WINDOW_START}
          while [ ${CURRENT} -lt ${WINDOW_END} ]; do
            CHUNK=$((CHUNK + 1))
            CHUNK_END=$((CURRENT + 3600))
            [ ${CHUNK_END} -gt ${WINDOW_END} ] && CHUNK_END=${WINDOW_END}
            CHUNK_MINUTES=$(( ((CHUNK_END - CURRENT) + 59) / 60 ))
            CHUNK_ISO=$(epoch_to_iso ${CURRENT})
            REMOTE_OUTPUT_DIR="/tmp/graylog_collect_chunk${CHUNK}"
            ssh "${SSH_OPTS[@]}" "${SSH_USER}@${MGMT_IP}" "mkdir -p '${REMOTE_OUTPUT_DIR}'" 2>/dev/null || true
            ssh "${SSH_OPTS[@]}" "${SSH_USER}@${MGMT_IP}" \
              "python3 -m simplyblock_core.scripts.collect_logs \
                '${CHUNK_ISO}' '${CHUNK_MINUTES}' \
                --mode docker \
                --output-dir '${REMOTE_OUTPUT_DIR}' \
                ${CLUSTER_ID:+--cluster-id '${CLUSTER_ID}'}" \
            2>&1 || {
              ssh "${SSH_OPTS[@]}" "${SSH_USER}@${MGMT_IP}" \
                "python3 -m simplyblock_core.scripts.collect_logs \
                  '${CHUNK_ISO}' '${CHUNK_MINUTES}' \
                  --mode docker --use-opensearch \
                  --output-dir '${REMOTE_OUTPUT_DIR}' \
                  ${CLUSTER_ID:+--cluster-id '${CLUSTER_ID}'}" \
              2>&1 || true
            }
            TARBALLS=$(ssh "${SSH_OPTS[@]}" "${SSH_USER}@${MGMT_IP}" \
              "find '${REMOTE_OUTPUT_DIR}' -name '*.tar.gz' -type f 2>/dev/null") || true
            if [ -n "${TARBALLS}" ]; then
              for TB in ${TARBALLS}; do
                scp "${SSH_OPTS[@]}" "${SSH_USER}@${MGMT_IP}:${TB}" "${OUTPUT_DIR}/$(basename ${TB})" 2>&1 || true
              done
              for TB_FILE in "${OUTPUT_DIR}"/*.tar.gz; do
                [ -f "${TB_FILE}" ] && tar -xzf "${TB_FILE}" -C "${OUTPUT_DIR}/" 2>/dev/null || true
              done
            fi
            ssh "${SSH_OPTS[@]}" "${SSH_USER}@${MGMT_IP}" "rm -rf '${REMOTE_OUTPUT_DIR}'" 2>/dev/null || true
            CURRENT=${CHUNK_END}
          done
          echo "=== Graylog collection complete (${CHUNK} chunks): ${OUTPUT_DIR} ==="

      - name: Collect mgmt snapshots into RUN_BASE_DIR (on failure)
        if: always()
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import os, subprocess

          mgmt_ip = os.environ["MNODES"].split()[0]
          key = os.environ["KEY_PATH"]
          user = os.environ["SSH_USER"]
          sbcli = os.environ["SBCLI_CMD"]
          cluster_id = os.environ["CLUSTER_ID"]
          run_base = os.environ["RUN_BASE_DIR"].rstrip("/")
          outdir = f"{run_base}/{mgmt_ip}/mgmt_details"

          os.makedirs(f"{outdir}/mgmt", exist_ok=True)
          os.makedirs(f"{outdir}/subtasks", exist_ok=True)
          os.makedirs(f"{outdir}/storage_nodes", exist_ok=True)

          script = r"""set -euo pipefail
          SBCLI="__SBCLI__"
          CLUSTER_ID="__CLUSTER_ID__"
          OUTDIR="__OUTDIR__"

          mkdir -p "$OUTDIR"/{mgmt,subtasks,storage_nodes}

          log(){ printf '[%(%F %T)T] %s\n' -1 "$*" >&2; }
          run_local(){ local cmd="$1" out="$2"; log "LOCAL: $cmd -> $out"; bash -lc "$cmd" > "$out" 2>&1 || true; }

          run_local "$SBCLI cluster list"                               "$OUTDIR/mgmt/cluster_list.txt"
          run_local "$SBCLI cluster status $CLUSTER_ID"                 "$OUTDIR/mgmt/cluster_status.txt"
          run_local "$SBCLI cluster show $CLUSTER_ID"                   "$OUTDIR/mgmt/cluster_show.txt"
          run_local "$SBCLI cluster get-capacity $CLUSTER_ID"           "$OUTDIR/mgmt/cluster_capacity.txt"
          run_local "$SBCLI cluster get-logs $CLUSTER_ID --limit 0"     "$OUTDIR/mgmt/cluster_get_logs.txt"

          run_local "$SBCLI pool list"                                  "$OUTDIR/mgmt/pool_list.txt"
          run_local "$SBCLI lvol list"                                  "$OUTDIR/mgmt/lvol_list.txt"
          run_local "$SBCLI snapshot list"                              "$OUTDIR/mgmt/snapshot_list.txt"

          run_local "$SBCLI sn list"                                    "$OUTDIR/mgmt/sn_list.txt"
          run_local "$SBCLI sn list --json"                             "$OUTDIR/mgmt/sn_list.json"

          SN_UUIDS=()
          if [[ -s "$OUTDIR/mgmt/sn_list.json" ]] && command -v jq >/dev/null 2>&1; then
            mapfile -t SN_UUIDS < <(jq -r '.[]?|.UUID // .uuid // .Id // .id // empty' "$OUTDIR/mgmt/sn_list.json" | awk 'NF')
          else
            mapfile -t SN_UUIDS < <(
              awk 'BEGIN{FS="|"} /^\|/ && !/UUID/ && !/^\+-/ {
                if (NF>=3) { gsub(/^[ \t]+|[ \t]+$/, "", $3); if ($3 ~ /[0-9a-f-]{8,}/) print $3; }
              }' "$OUTDIR/mgmt/sn_list.txt" | sort -u
            )
          fi

          idx=1
          for uuid in "${SN_UUIDS[@]}"; do
            run_local "$SBCLI sn list-devices $uuid"  "$OUTDIR/storage_nodes/node${idx}_list_devices.txt"
            run_local "$SBCLI sn check $uuid"         "$OUTDIR/storage_nodes/node${idx}_check.txt"
            run_local "$SBCLI sn get $uuid"           "$OUTDIR/storage_nodes/node${idx}_get.txt"
            idx=$((idx+1))
          done

          run_local "$SBCLI cluster list-tasks $CLUSTER_ID --limit 0"   "$OUTDIR/mgmt/cluster_list_tasks.txt"

          BAL_IDS=()
          while IFS= read -r line; do
            [[ "$line" =~ ^\+ ]] && continue
            [[ "$line" =~ Task\ ID ]] && continue
            [[ "$line" =~ ^\|[[:space:]]*$ ]] && continue

            func=$(awk -F'|' '{gsub(/^[ \t]+|[ \t]+$/, "", $4); print $4}' <<<"$line")
            if [[ "$func" == "balancing_on_restart" ]]; then
              task_id=$(awk -F'|' '{gsub(/^[ \t]+|[ \t]+$/, "", $2); print $2}' <<<"$line")
              [[ -n "$task_id" ]] && BAL_IDS+=("$task_id")
            fi
          done < "$OUTDIR/mgmt/cluster_list_tasks.txt"

          for tid in "${BAL_IDS[@]:-}"; do
            run_local "$SBCLI cluster get-subtasks $tid" "$OUTDIR/subtasks/${tid}_subtasks.txt"
          done
          """

          script = (script
                    .replace("__SBCLI__", sbcli)
                    .replace("__CLUSTER_ID__", cluster_id)
                    .replace("__OUTDIR__", outdir))

          ssh_cmd = [
              "ssh",
              "-i", key,
              "-o", "StrictHostKeyChecking=no",
              "-o", "UserKnownHostsFile=/dev/null",
              "-o", "ConnectTimeout=10",
              f"{user}@{mgmt_ip}",
              "bash", "-s",
          ]

          subprocess.run(ssh_cmd, input=script.encode(), check=False)
          PY

      - name: Collect docker logs into RUN_BASE_DIR (on failure)
        if: always()
        shell: bash
        run: |
          set -euxo pipefail

          TAG="containers-final-$(date +%Y%m%d_%H%M%S)"
          SSH_OPTS=(-i "${KEY_PATH}" -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -C)

          NODES="$(echo "${MNODES} ${STORAGE_PRIVATE_IPS}" | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' ')"

          for NODE in ${NODES}; do
            echo ">>> Node: ${NODE}"
            REMOTE_DIR="${RUN_BASE_DIR}/${NODE}/${TAG}"

            ssh "${SSH_OPTS[@]}" "${SSH_USER}@${NODE}" "sudo mkdir -p '${REMOTE_DIR}' && sudo chmod -R 0777 '${RUN_BASE_DIR}/${NODE}'" || true
            ssh "${SSH_OPTS[@]}" "${SSH_USER}@${NODE}" "bash -lc \"docker ps -a > '${REMOTE_DIR}/docker_ps_a_${NODE}.txt' 2>&1 || true\"" || true

            CONTAINERS="$(ssh "${SSH_OPTS[@]}" "${SSH_USER}@${NODE}" "bash -lc \"docker ps -a --format '{{.Names}}' || true\"" || true)"

            if [[ -z "${CONTAINERS}" ]]; then
              ssh "${SSH_OPTS[@]}" "${SSH_USER}@${NODE}" "bash -lc \"echo 'No containers found' > '${REMOTE_DIR}/_NO_CONTAINERS_${NODE}.txt'\"" || true
              continue
            fi

            set +e
            while IFS= read -r C; do
              C="${C%%$'\r'}"
              [[ -z "${C}" ]] && continue
              echo "    dumping: ${C}"
              LOG_FILE="${REMOTE_DIR}/${C}.txt"
              INSPECT_FILE="${REMOTE_DIR}/${C}_inspect.json"

              ssh "${SSH_OPTS[@]}" "${SSH_USER}@${NODE}" "bash -lc \"docker logs --timestamps --details '${C}' > '${LOG_FILE}' 2>&1 || true\"" || true
              ssh "${SSH_OPTS[@]}" "${SSH_USER}@${NODE}" "bash -lc \"docker inspect '${C}' > '${INSPECT_FILE}' 2>&1 || true\"" || true
            done <<< "${CONTAINERS}"
            set -e
          done


      - name: Collect distrib debug dumps into RUN_BASE_DIR (on failure)
        if: always()
        timeout-minutes: 35
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import os, subprocess, sys, textwrap

          ssh_user = os.environ["SSH_USER"]
          key = os.environ["KEY_PATH"]
          run_base = os.environ["RUN_BASE_DIR"].rstrip("/")
          tag = "finaldistrib_bdev_logs"

          storage_ips = os.environ["STORAGE_PRIVATE_IPS"].split()

          ssh_base = [
              "ssh",
              "-i", key,
              "-o", "StrictHostKeyChecking=no",
              "-o", "UserKnownHostsFile=/dev/null",
              "-o", "ServerAliveInterval=15",
              "-o", "ServerAliveCountMax=4",
              "-o", "ConnectTimeout=10",
              "-C",
          ]

          scp_base = [
              "scp",
              "-i", key,
              "-o", "StrictHostKeyChecking=no",
              "-o", "UserKnownHostsFile=/dev/null",
              "-o", "ConnectTimeout=10",
              "-C",
          ]

          remote_script = """\
          set -euo pipefail
          TS="$(date +%Y%m%d_%H%M%S)"
          HOST="$(hostname -s 2>/dev/null || hostname)"
          STAGING="/tmp/distrib_host_collect_${TS}"
          mkdir -p "$STAGING"

          CN="$(sudo docker ps --format '{{.Names}}' | grep -E '^spdk_[0-9]+$' | head -n1 || true)"
          if [[ -z "$CN" ]]; then echo "NO_SPDK_CONTAINER"; exit 0; fi
          SOCK="/mnt/ramdisk/${CN}/spdk.sock"

          BDEV_JSON="$(sudo docker exec "$CN" bash -lc "python spdk/scripts/rpc.py -s '$SOCK' bdev_get_bdevs" 2>/dev/null || true)"
          if [[ -z "$BDEV_JSON" ]]; then echo "BDEV_EMPTY"; exit 0; fi

          if command -v jq >/dev/null 2>&1; then
            mapfile -t DISTRIBS < <(printf '%s' "$BDEV_JSON" | jq -r '.[] | select(.name|startswith("distrib_")) | .name' | sort -u)
          else
            mapfile -t DISTRIBS < <(printf '%s\n' "$BDEV_JSON" | grep -oE '"name"\\s*:\\s*"distrib_[^"]+"' | sed -E 's/.*"name"\\s*:\\s*"([^"]+)".*/\\1/' | sort -u)
          fi

          if [[ ${#DISTRIBS[@]} -eq 0 ]]; then echo "NO_DISTRIBS"; exit 0; fi

          for d in "${DISTRIBS[@]}"; do
            JF="/tmp/stack_${d}.json"

            python3 - "$d" "$JF" <<'PYIN'
          import json, sys
          d = sys.argv[1]
          jf = sys.argv[2]
          obj = {"subsystems":[{"subsystem":"distr","config":[{"method":"distr_debug_placement_map_dump","params":{"name":d}}]}]}
          with open(jf, "w") as f:
              f.write(json.dumps(obj))
          PYIN

            sudo docker cp "$JF" "$CN:$JF" || true
            sudo docker exec "$CN" bash -lc "python scripts/rpc_sock.py '$JF' '$SOCK' > /tmp/rpc_${d}.log 2>&1 || true" || true
            sudo docker cp "$CN:/tmp/rpc_${d}.log" "$STAGING/rpc_${d}.log" 2>/dev/null || true

            for f in $(sudo docker exec "$CN" bash -lc "ls /tmp 2>/dev/null | grep -F \\"$d\\" || true"); do
              sudo docker cp "$CN:/tmp/$f" "$STAGING/${CN}__$f" 2>/dev/null || true
            done

            sudo docker exec "$CN" bash -lc "rm -f '$JF' '/tmp/rpc_${d}.log'" || true
            rm -f "$JF" || true
          done

          cat /proc/meminfo | grep -i huge > "$STAGING/hugepage_meminfo.txt" 2>/dev/null || true

          TAR="/tmp/${HOST}_distrib_dumps_${TS}.tgz"
          tar -C "$STAGING" -czf "$TAR" . 2>/dev/null || true
          echo "$TAR"
          """

          # NOTE: the only heredoc above (<<'PYIN') is inside the REMOTE SCRIPT,
          # not inside YAML. YAML never sees it (we send script via stdin).

          for ip in storage_ips:
              print(f"=== {ip} ===", flush=True)

              # Run remote script via stdin (no YAML heredoc)
              cmd = ssh_base + [f"{ssh_user}@{ip}", "bash", "-s"]
              p = subprocess.run(cmd, input=remote_script.encode(), stdout=subprocess.PIPE, stderr=subprocess.STDOUT, check=False)
              out = p.stdout.decode(errors="replace").strip().splitlines()
              last = out[-1].strip() if out else ""
              last = last.replace("\r", "")

              if last in ("NO_SPDK_CONTAINER", "BDEV_EMPTY", "NO_DISTRIBS") or not last.startswith("/tmp/"):
                  print(f"[{ip}] WARN: distrib collection skipped/failed: {last or '(no output)'}", flush=True)
                  continue

              dest_dir = f"{run_base}/{ip}/{tag}"
              os.makedirs(dest_dir, exist_ok=True)

              scp_cmd = scp_base + [f"{ssh_user}@{ip}:{last}", dest_dir + "/"]
              subprocess.run(scp_cmd, check=False)

              print(f"[{ip}] ✓ Saved → {dest_dir}/{os.path.basename(last)}", flush=True)
          PY
        
      # =========================
      # SUMMARY (always): test run, outages, failure reason, mgmt files, duration
      # Assumes outages are in sbcli/e2e/logs/outage*
      # =========================
      - name: Write Job Summary (test/outages/failure/mgmt/duration)
        if: always()
        shell: bash
        run: |
          set -euxo pipefail

          mgmt_ip="$(echo "${MNODES}" | awk '{print $1}')"
          out_log="sbcli/e2e/output.log"

          start="${TEST_START_EPOCH:-0}"
          end="${TEST_END_EPOCH:-0}"
          dur_sec=0
          if [[ "$start" =~ ^[0-9]+$ && "$end" =~ ^[0-9]+$ && "$end" -ge "$start" ]]; then
            dur_sec=$((end-start))
          fi
          dur_h=$((dur_sec/3600))
          dur_m=$(((dur_sec%3600)/60))
          dur_s=$((dur_sec%60))
          dur_fmt="${dur_h}h ${dur_m}m ${dur_s}s"

          outage_dir="sbcli/e2e/logs"
          outage_count=0
          outage_latest=""
          outage_lines=0
          outage_tail=""
          if compgen -G "${outage_dir}/outage*" > /dev/null; then
            outage_count="$(ls -1 ${outage_dir}/outage* 2>/dev/null | wc -l | awk '{print $1}')"
            outage_latest="$(ls -1t ${outage_dir}/outage* 2>/dev/null | head -n 1 || true)"
            outage_lines="$(cat ${outage_dir}/outage* 2>/dev/null | wc -l | awk '{print $1}')"
            [[ -n "${outage_latest}" && -f "${outage_latest}" ]] && outage_tail="$(tail -n 20 "${outage_latest}" 2>/dev/null || true)"
          fi

          # --- failure reason: MultipleExceptions line has "TestName: actual error" ---
          failure_summary="(unknown)"
          log_tail=""
          if [[ -f "${out_log}" ]]; then
            # The MultipleExceptions line is the definitive failure summary: "TestName: error"
            failure_summary="$(grep -oE 'MultipleExceptions: .+|SkippedTestsException: .+' "${out_log}" \
              | tail -n 1 | sed 's/\x1b\[[0-9;]*m//g' || true)"
            if [[ -z "${failure_summary}" ]]; then
              # Fallback: last RuntimeError / AssertionError logged
              failure_summary="$(grep -E 'RuntimeError:|AssertionError:|Error:' "${out_log}" \
                | tail -n 1 | sed 's/\x1b\[[0-9;]*m//g' || true)"
            fi
            [[ -z "${failure_summary}" ]] && failure_summary="(no exception line found)"
            log_tail="$(tail -n 50 "${out_log}" | sed 's/\x1b\[[0-9;]*m//g' || true)"
          fi

          # --- test result counts from stress.py log lines ---
          total_cases="$(grep -E 'Number of Total Cases:' "${out_log}" 2>/dev/null | tail -n 1 | grep -oE '[0-9]+$' || echo '?')"
          passed_cnt="$(grep -E 'Number of Passed Cases:' "${out_log}" 2>/dev/null | tail -n 1 | grep -oE '[0-9]+$' || echo '?')"
          failed_cnt="$(grep -E 'Number of Failed Cases:' "${out_log}" 2>/dev/null | tail -n 1 | grep -oE '[0-9]+$' || echo '?')"
          skipped_cnt="$(grep -E 'Number of Skipped Cases:' "${out_log}" 2>/dev/null | tail -n 1 | grep -oE '[0-9]+$' || echo '?')"
          test_wise="$(grep -E '(PASSED|FAILED|SKIPPED) CASE\.' "${out_log}" 2>/dev/null \
            | sed 's/\x1b\[[0-9;]*m//g' | sed 's/.*INFO - //' || true)"

          mgmt_dir="${RUN_BASE_DIR:-}/$(echo "${MNODES}" | awk '{print $1}')/mgmt_details/mgmt"
          mgmt_files="(not found)"
          if [[ -n "${RUN_BASE_DIR:-}" && -d "${mgmt_dir}" ]]; then
            mgmt_files="$(find "${mgmt_dir}" -maxdepth 1 -type f -printf '%f (%s bytes)\n' 2>/dev/null | sort || true)"
            [[ -n "${mgmt_files}" ]] || mgmt_files="(empty)"
          fi

          conclusion="SUCCESS"
          if [[ "${{ job.status }}" != "success" ]]; then
            conclusion="FAILED"
          fi

          {
            echo "## SimplyBlock Stress Run Summary"
            echo ""
            echo "**Result:** ${conclusion}"
            echo ""
            echo "### Run Info"
            echo "- **Test class:** \`${TEST_CLASS}\`"
            echo "- **Cluster ID:** \`${CLUSTER_ID}\`"
            echo "- **Mgmt node:** \`${mgmt_ip}\`"
            echo "- **NDCS/NPCS:** \`${NDCS}/${NPCS}\`"
            echo "- **Start (UTC):** ${TEST_START_HUMAN:-unknown}"
            echo "- **End (UTC):** ${TEST_END_HUMAN:-unknown}"
            echo "- **Duration:** ${dur_fmt}"
            echo ""
            echo "### Test Results"
            echo "- **Total:** ${total_cases} | **Passed:** ${passed_cnt} | **Failed:** ${failed_cnt} | **Skipped:** ${skipped_cnt}"
            if [[ -n "${test_wise}" ]]; then
              echo '```'
              printf '%s\n' "${test_wise}"
              echo '```'
            fi
            echo ""
            echo "### NFS Run Folder"
            echo "- **RUN_BASE_DIR:** \`${RUN_BASE_DIR:-not detected}\`"
            echo "- Client logs: \`${RUN_BASE_DIR:-<run_dir>}/ClientLogs\`"
            echo "- Mgmt details: \`${RUN_BASE_DIR:-<run_dir>}/${mgmt_ip}/mgmt_details\`"
            echo ""
            echo "### Outages"
            echo "- Outage files matched: \`${outage_dir}/outage*\`"
            echo "- **Outage file count:** ${outage_count}"
            echo "- **Total outage log lines:** ${outage_lines}"
            [[ -n "${outage_latest}" ]] && echo "- **Latest outage file:** \`${outage_latest}\`"
            if [[ -n "${outage_tail}" ]]; then
              echo ""
              echo "<details><summary>Latest outage file (last 20 lines)</summary>"
              echo ""
              echo '```'
              printf '%s\n' "${outage_tail}"
              echo '```'
              echo "</details>"
            fi
            echo ""
            echo "### Failure Reason"
            echo '```'
            printf '%s\n' "${failure_summary}"
            echo '```'
            if [[ -n "${log_tail}" ]]; then
              echo ""
              echo "<details><summary>Last 50 lines of output.log</summary>"
              echo ""
              echo '```'
              printf '%s\n' "${log_tail}"
              echo '```'
              echo "</details>"
            fi
            echo ""
            echo "### Mgmt Artifacts (mgmt_details/mgmt)"
            echo "- Path: \`${mgmt_dir}\`"
            echo "<details><summary>Files</summary>"
            echo ""
            echo '```'
            printf '%s\n' "${mgmt_files}"
            echo '```'
            echo "</details>"
            echo ""
            echo "### Key Logs"
            echo "- Runner stress log: \`${out_log}\`"
            echo "- Outage logs: \`${outage_dir}/outage*\`"
            echo "- Docker logs: \`${RUN_BASE_DIR:-<run_dir>}/<node_ip>/containers-final-*\`"
            echo "- Distrib dumps: \`${RUN_BASE_DIR:-<run_dir>}/<storage_ip>/finaldistrib_bdev_logs/\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send Slack Notification
        if: always()
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          SLACK_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GITHUB_REF_NAME: ${{ github.ref_name }}
          SLACK_WF_NAME: "Stress (Bootstrap)"
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys, urllib.request, urllib.error
          webhook = os.environ.get("SLACK_WEBHOOK_URL", "")
          if not webhook:
              print("No SLACK_WEBHOOK_URL set, skipping.")
              sys.exit(0)
          out_log = "sbcli/e2e/output.log"
          total = passed = failed = skipped = 0
          if os.path.isfile(out_log):
              content = open(out_log).read()
              def px(pat):
                  m = re.search(pat, content)
                  return int(m.group(1)) if m else 0
              total   = px(r'Number of Total Cases:\s*(\d+)')
              passed  = px(r'Number of Passed Cases:\s*(\d+)')
              failed  = px(r'Number of Failed Cases:\s*(\d+)')
              skipped = px(r'Number of Skipped Cases:\s*(\d+)')
          pass_pct = (passed * 100 // total) if total > 0 else 0
          s    = int(os.environ.get("TEST_START_EPOCH", "0") or "0")
          e    = int(os.environ.get("TEST_END_EPOCH",   "0") or "0")
          secs = max(0, e - s) if e >= s > 0 else 0
          dur  = f"{secs//3600}h {(secs%3600)//60}m {secs%60}s"
          run_url  = os.environ.get("SLACK_RUN_URL",   "")
          log_dir  = os.environ.get("RUN_BASE_DIR",    "N/A")
          ndcs     = os.environ.get("NDCS",            "?")
          npcs     = os.environ.get("NPCS",            "?")
          test_cls = os.environ.get("TEST_CLASS",      "") or "all"
          branch   = os.environ.get("GITHUB_REF_NAME", "?")
          wf_name  = os.environ.get("SLACK_WF_NAME",   "Run")
          ok       = os.environ.get("JOB_STATUS",      "") == "success"
          icon    = ":white_check_mark:" if ok else ":x:"
          status  = "SUCCESS" if ok else "FAILURE"
          mention = "" if ok else " <!channel>"
          lines = [
              f"{icon} *SimplyBlock {wf_name}*{mention}",
              f"*Status:* {status}  |  *Duration:* {dur}",
              f"*Branch:* `{branch}`  |  *NDCS/NPCS:* `{ndcs}/{npcs}`  |  *Test class:* `{test_cls}`",
              "",
          ]
          if total > 0:
              lines += [
                  f":white_check_mark: *Passed:*  {passed}/{total}  ({pass_pct}%)",
                  f":x: *Failed:*  {failed}",
                  f":fast_forward: *Skipped:*  {skipped}",
              ]
          else:
              lines.append("_(test counts not found in log)_")
          lines += [
              "",
              f":link: *Run:* <{run_url}|View on GitHub>",
              f":file_folder: *Final Logs:* `{log_dir}`",
          ]
          payload = {"text": "\n".join(lines)}
          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
          )
          try:
              urllib.request.urlopen(req, timeout=15)
              print("Slack notification sent.")
          except Exception as exc:
              print(f"WARN: Slack notification failed: {exc}", file=sys.stderr)
          PYEOF

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simplyblock-stress-logs-${{ github.run_id }}
          path: |
            simplyBlockDeploy/bare-metal/bootstrap.log
            sbcli/e2e/output.log
            sbcli/e2e/logs/**
          if-no-files-found: warn

      - name: Export MGMT_IP (first MNODES)
        if: always()
        shell: bash
        run: |
          echo "MGMT_IP=$(echo "${MNODES}" | awk '{print $1}')" >> "$GITHUB_ENV"
      
      - name: Upload small artifacts (always)
        if: always() && env.RUN_BASE_DIR != '' && env.MGMT_IP != ''
        uses: actions/upload-artifact@v4
        with:
          name: simplyblock-small-logs-${{ github.run_id }}
          path: |
            sbcli/e2e/output.log
            ${{ env.RUN_BASE_DIR }}/${{ env.MGMT_IP }}/mgmt_details/mgmt/*.txt
            ${{ env.RUN_BASE_DIR }}/${{ env.MGMT_IP }}/mgmt_details/subtasks/*.txt
            ${{ env.RUN_BASE_DIR }}/${{ env.MGMT_IP }}/mgmt_details/storage_nodes/*.txt
          if-no-files-found: warn
