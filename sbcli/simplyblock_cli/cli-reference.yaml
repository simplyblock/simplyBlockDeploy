        arguments:
          - name: "--cluster-id"
            help: "The cluster id."
            dest: cluster_id
            type: str
          - name: "--lvol"
            help: "Filter exports to a specific logical volume name."
            dest: lvol_name
            type: str
          - name: "-o"
            aliases:
              - "--output"
            help: "The output file path."
            dest: output
            type: str
      - name: import
        help: "Import backup metadata from a JSON file."
        arguments:
          - name: "metadata_file"
            help: "The path to JSON metadata file."
            dest: metadata_file
            type: str
          - name: "--cluster-id"
            help: "The target cluster to import into (required for cross-cluster restore)."
            dest: cluster_id
            type: str
      - name: policy-add
        help: "Create a new backup policy."
        arguments:
          - name: "cluster_id"
            help: "The cluster id."
            dest: cluster_id
            type: str
          - name: "name"
            help: "The policy name."
            dest: name
            type: str
          - name: "--versions"
            help: "The maximum number of backup versions."
            dest: versions
            type: int
          - name: "--age"
            help: "Maximum backup age (e.g. 2d, 12h, 1w)."
            dest: age
            type: str
          - name: "--schedule"
            help: "Auto-backup schedule as space-separated tiers: \"15m,4 60m,11 24h,7\" (interval,keep_count per tier)."
            dest: schedule
            type: str
      - name: policy-remove
        help: "Remove a backup policy."
        arguments:
          - name: "policy_id"
            help: "The backup policy id."
            dest: policy_id
            type: str
      - name: policy-list
        help: "List all backup policies."
        arguments:
          - name: "--cluster-id"
            help: "The cluster id."
            dest: cluster_id
            type: str
      - name: policy-attach
        help: "Attach a backup policy to a storage pool or logical volume."
        arguments:
          - name: "policy_id"
            help: "The backup policy id."
            dest: policy_id
            type: str
          - name: "target_type"
            help: "The target type."
            dest: target_type
            type: str
            choices:
              - pool
              - lvol
          - name: "target_id"
            help: "The target id (storage pool or logical volume id)."
            dest: target_id
            type: str
      - name: policy-detach
        help: "Detach a backup policy from a storage pool or logical volume."
        arguments:
          - name: "policy_id"
            help: "The backup policy id."
            dest: policy_id
            type: str
          - name: "target_type"
            help: "The target type."
            dest: target_type
            type: str
            choices:
              - pool
              - lvol
          - name: "target_id"
            help: "The target id (storage pool or logical volume id)."
            dest: target_id
            type: str
      - name: source-list
        help: "List backup sources (local and imported clusters)."
        arguments:
          - name: "--cluster-id"
            help: "The cluster id."
            dest: cluster_id
            type: str
      - name: source-switch
        help: "Switch the active S3 backup source to a different cluster. Use 'local' or the local cluster id to switch back."
        arguments:
          - name: "source_cluster_id"
            help: "The source cluster id or 'local'."
            dest: source_cluster_id
            type: str
          - name: "--cluster-id"
            help: "The cluster id."
            dest: cluster_id
            type: str
  - name: "qos"
    help: "QoS Commands"
    weight: 700
    subcommands:
      - name: add
        help: "Creates a new QoS class"
        arguments:
          - name: "name"
            help: "QoS class name"
            dest: name
            type: str
          - name: "weight"
            help: "QoS class weight"
            dest: weight
            type: int
          - name: "cluster_id"
            help: "The cluster id."
            dest: cluster_id
            type: str
            required: false
            default: ""
      - name: list
        help: "Lists all qos classes."
        arguments:
          - name: "cluster_id"
            help: "The cluster id."
            dest: cluster_id
            type: str
            required: false
            default: ""
          - name: "--json"
            help: "Print json output."
            dest: json
            type: bool
            action: store_true
      - name: delete
        help: "Delete a class."
        arguments:
          - name: "name"
            help: "QoS class name"
            dest: name
            type: str
          - name: "cluster_id"
            help: "The cluster id."
            dest: cluster_id
            type: str
            required: false
            default: ""
