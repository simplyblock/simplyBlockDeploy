          - name: "--is-single-node"
            help: "For single-node clusters only. Default: `false`."
            dest: is_single_node
            type: bool
            action: store_true
            default: false
          - name: "--qpair-count"
            help: "The NVMe/TCP transport qpair count per logical volume. Default: `32`."
            usage: >
              Increase for clusters with few but very large logical volumes or decrease for clusters with a large number
              of very small logical volumes.
            dest: qpair_count
            type:
              range:
                min: 0
                max: 128
            default: 32
          - name: "--client-qpair-count"
            help: "The default NVMe/TCP transport qpair count per logical volume for client. Default: `3`."
            usage: >
              Increase for clusters with few but very large logical volumes or decrease for clusters with a large number
              of very small logical volumes.
            dest: client_qpair_count
            type:
