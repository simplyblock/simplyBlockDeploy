      - lvol
    weight: 300
    subcommands:
      - name: add
        help: "Adds a new logical volume."
        arguments:
          - name: "name"
            help: "The new logical volume name."
            dest: name
            type: str
          - name: "size"
            help: "Logical volume size: 10M, 10G, 10(bytes)."
            dest: size
            type: size
          - name: "pool"
            help: "The storage pool id or name."
            dest: pool
            type: str
          - name: "--snapshot"
            aliases:
              - "-s"
            help: "Make logical volume with snapshot capability. Default: `false`."
            dest: snapshot
            type: bool
            action: store_true
            default: false
          - name: "--max-size"
            help: "The logical volume max size. Default: `1000T`."
            dest: max_size
            type: size
            default: "1000T"
          - name: "--host-id"
            help: "The primary storage node id or hostname."
            dest: host_id
            type: str
          - name: "--encrypt"
            help: "Use inline data encryption and decryption on the logical volume."
            dest: encrypt
            type: bool
            action: store_true
          - name: "--crypto-key1"
            help: "The hex value of key1 to be used for logical volume encryption."
            dest: crypto_key1
            type: str
            deprecated:
              since: "26.2"
              reason: "This has been replaced by internal or external KMS support. See https://docs.simplyblock.io/latest/usage/baremetal/encrypting/"
          - name: "--crypto-key2"
            help: "The hex value of key2 to be used for logical volume encryption."
            dest: crypto_key2
            type: str
            deprecated:
              since: "26.2"
              reason: "This has been replaced by internal or external KMS support. See https://docs.simplyblock.io/latest/usage/baremetal/encrypting/"
          - name: "--max-rw-iops"
            help: "Maximum Read Write IO Per Second."
            dest: max_rw_iops
            type: int
          - name: "--max-rw-mbytes"
            help: "Maximum Read Write Megabytes Per Second."
            dest: max_rw_mbytes
            type: int
          - name: "--max-r-mbytes"
            help: "Maximum Read Megabytes Per Second."
            dest: max_r_mbytes
            type: int
          - name: "--max-w-mbytes"
            help: "Maximum Write Megabytes Per Second."
            dest: max_w_mbytes
            type: int
          - name: "--max-namespace-per-subsys"
            help: "The maximum Namespace per subsystem. Default: `32`."
            dest: max_namespace_per_subsys
            type: int
            default: 32
          - name: "--distr-vuid"
            help: "The (Dev) set vuid manually."
            dest: distr_vuid
            type: int
            private: true
          - name: "--ha-type"
            help: "Logical volume HA type (single, ha), default is cluster HA type. Default: `default`."
            dest: ha_type
            type: str
            choices:
              - single
              - default
              - ha
            default: default
          - name: "--fabric"
            help: "The transport fabric type (tcp or rdma). The cluster must support the chosen fabric. Default: `tcp`."
            dest: fabric
            type: str
            choices:
              - tcp
              - rdma
              - tcp,rdma
            default: tcp
          - name: "--lvol-priority-class"
            help: "The logical volume priority class. Default: `0`."
            dest: lvol_priority_class
            type: int
            default: 0
          - name: "--namespaced"
            help: "Adds this LVol as a namespace on any available subsystem, if not found then create a new subsystem. Default: `false`."
            dest: namespaced
            type: bool
            default: false
          - name: "--uid"
            help: "Set logical volume id."
            dest: uid
            type: str
            private: true
          - name: "--pvc-name"
            aliases:
              - "--pvc_name"
            help: "Set logical volume PVC name for k8s clients"
            description: >-
              Set the logical volume persistent volume claim name for Kubernetes clients.<br><br>
              The old parameter name `--pvc_name` is deprecated and shouldn't be used anymore. It will eventually be
              removed. Please exchange the use of `--pvc_name` with `--pvc-name`.
            dest: pvc_name
            type: str
          - name: "--data-chunks-per-stripe"
            help: "The erasure coding schema parameter k (distributed raid). Default: `0`."
            dest: ndcs
            type: int
            default: 0
          - name: "--parity-chunks-per-stripe"
            help: "The erasure coding schema parameter n (distributed raid). Default: `0`."
            dest: npcs
            type: int
            default: 0
          - name: "--replicate"
            help: "Replicate LVol snapshot"
            dest: replicate
            type: bool
            action: store_true
      - name: qos-set
        help: "Changes QoS settings for an active logical volume."
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
          - name: "--max-rw-iops"
            help: "Maximum Read Write IO Per Second."
            dest: max_rw_iops
            type: int
          - name: "--max-rw-mbytes"
            help: "Maximum Read Write Megabytes Per Second."
            dest: max_rw_mbytes
            type: int
          - name: "--max-r-mbytes"
            help: "Maximum Read Megabytes Per Second."
            dest: max_r_mbytes
            type: int
          - name: "--max-w-mbytes"
            help: "Maximum Write Megabytes Per Second."
            dest: max_w_mbytes
            type: int
      - name: list
        help: "Lists logical volumes."
        arguments:
          - name: "--cluster-id"
            help: "List logical volumes in particular cluster."
            dest: cluster_id
            type: str
          - name: "--pool"
            help: "List logical volumes in particular pool id or name."
            dest: pool
            type: str
          - name: "--json"
            help: "Print outputs in json format."
            dest: json
            type: bool
            action: store_true
          - name: "--all"
            help: "List soft deleted logical volumes."
            dest: all
            type: bool
            action: store_true
      - name: get
        help: "Gets the logical volume details."
        arguments:
          - name: "volume_id"
            help: "The logical volume id or name."
            dest: volume_id
            type: str
          - name: "--json"
            help: "Print outputs in json format."
            dest: json
            type: bool
            action: store_true
      - name: delete
        help: "Deletes a logical volume."
        usage: >
          Deletes a logical volume. Attention: All data will be lost! This is an irreversible operation! Actual storage
          capacity will be freed as an asynchronous background task. It may take a while until the actual storage
          is released.
        arguments:
          - name: "volume_id"
            help: "The logical volumes id or ids."
            dest: volume_id
            type: str
            nargs: "+"
          - name: "--force"
            help: "Force delete logical volume from the cluster."
            dest: force
            type: bool
            action: store_true
      - name: connect
        help: "Gets the logical volume's NVMe/TCP connection string(s)."
        usage: Multiple connections to the cluster are always available for multi-pathing and high-availability.
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
          - name: "--ctrl-loss-tmo"
            dest: "ctrl_loss_tmo"
            help: "The control loss timeout for this volume."
            type: int
          - name: "--host-nqn"
            help: "Host NQN for DH-HMAC-CHAP authentication (required when volume has allowed hosts with secrets)."
            dest: host_nqn
            type: str
      - name: resize
        help: "Resizes a logical volume."
        usage: >
          Resizes a logical volume. Only increasing a volume is possible. The new capacity must fit into the storage
          pool's free capacity.
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
          - name: "size"
            help: "New logical volume size size: 10M, 10G, 10(bytes)."
            dest: size
            type: size
      - name: create-snapshot
        help: "Creates a snapshot from a logical volume."
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
          - name: "name"
            help: "The snapshot name."
            dest: name
            type: str
          - name: "--backup"
            help: "Also create an S3 backup of this snapshot."
            dest: backup
            type: bool
            action: store_true
      - name: clone
        help: "Provisions a logical volumes from an existing snapshot."
        arguments:
          - name: "snapshot_id"
            help: "The snapshot id."
            dest: snapshot_id
            type: str
          - name: "clone_name"
            help: "The clone name."
            dest: clone_name
            type: str
          - name: "--resize"
            help: "New logical volume size: 10M, 10G, 10(bytes). Can only increase. Default: `0`."
            dest: resize
            type: size
            default: "0"
          - name: "--namespaced"
            help: "Adds this LVol as a namespace on any available subsystem, if not found then create a new subsystem. Default: `true`."
            dest: namespaced
            type: bool
            default: true
      - name: move
        help: "Moves a full copy of the logical volume between nodes."
        private: true
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
          - name: "node_id"
            help: "The destination node id."
            dest: node_id
            type: str
          - name: "--force"
            help: "Force logical volume delete from source node."
            dest: force
            type: bool
            action: store_true
      - name: get-capacity
        help: "Gets a logical volume's capacity."
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
          - name: "--history"
            help: "(XXdYYh), list history records (one for every 15 minutes) for XX days and YY hours (up to 10 days in total)."
            dest: history
            type: str
      - name: get-io-stats
        help: "Gets a logical volume's I/O statistics."
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
          - name: "--history"
            help: "(XXdYYh), list history records (one for every 15 minutes) for XX days and YY hours (up to 10 days in total)."
            dest: history
            type: str
          - name: "--records"
            help: "The number of records. Default: `20`."
            dest: records
            type: int
            default: 20
      - name: check
        help: "Checks a logical volume's health."
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
      - name: inflate
        help: "Inflate a logical volume."
        usage: >
          All unallocated clusters are allocated and copied from the parent or zero filled if not allocated in the
          parent. Then all dependencies on the parent are removed.
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
      - name: replication-start
        help: "Start snapshot replication taken from lvol"
        arguments:
          - name: "lvol_id"
            help: "Logical volume id"
            dest: lvol_id
            type: str
          - name: "--replication-cluster-id"
            help: "Cluster ID of the replication target cluster"
            dest: replication_cluster_id
            type: str
      - name: replication-stop
        help: "Stop snapshot replication taken from lvol"
        arguments:
          - name: "lvol_id"
            help: "Logical volume id"
            dest: lvol_id
            type: str
      - name: replication-status
        help: "Lists replication status"
        arguments:
          - name: "cluster_id"
            help: "Cluster UUID"
            dest: cluster_id
            type: str
      - name: replication-trigger
        help: "Start replication for lvol"
        arguments:
          - name: "lvol_id"
            help: "Logical volume id"
            dest: lvol_id
            type: str
      - name: suspend
        help: "Suspend lvol subsystems"
        arguments:
          - name: "lvol_id"
            help: "Logical volume id"
            dest: lvol_id
            type: str
      - name: resume
        help: "Resume lvol subsystems"
        arguments:
          - name: "lvol_id"
            help: "Logical volume id"
            dest: lvol_id
            type: str
      - name: clone-lvol
        help: "Create logical volume clone by taking a snapshot and then cloning it."
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
          - name: "clone_name"
            help: "The new logical volume clone name."
            dest: clone_name
            type: str
      - name: migrate
        help: "Migrate a logical volume to a different storage node."
        private: true
        arguments:
          - name: "volume_id"
            help: "The logical volume id."
            dest: volume_id
            type: str
          - name: "target_node_id"
            help: "The target storage node id."
            dest: target_node_id
            type: str
          - name: "--max-retries"
            help: "Maximum retry attempts before aborting. Default: `10`."
            dest: max_retries
            type: int
            default: 10
          - name: "--deadline"
            help: "Migration deadline in seconds (0 = no deadline. Default: `14400`."
            dest: deadline_seconds
            type: int
            default: 14400
      - name: migrate-list
        help: "List volume migrations."
        private: true
        arguments:
          - name: "--cluster-id"
            help: "Filter by cluster id."
            dest: cluster_id
            type: str
          - name: "--json"
            help: "Print output in json format."
            dest: json
            type: bool
            action: store_true
      - name: migrate-cancel
        help: "Cancel an active volume migration."
        private: true
        arguments:
          - name: "migration_id"
            help: "The migration id."
            dest: migration_id
            type: str
  - name: "control-plane"
    help: "Control Plane Commands"
    aliases:
