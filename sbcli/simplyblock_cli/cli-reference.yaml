            type: str
          - name: "--json"
            help: "Print outputs in json format."
            dest: json
            type: bool
            action: store_true
      - name: delete
        help: "Deletes a storage pool."
        usage: It is only possible to delete a pool if it is empty (no provisioned logical volumes contained).
        arguments:
          - name: "pool_id"
            help: "The storage pool id."
            dest: pool_id
            type: str
      - name: enable
        help: "Set a storage pool's status to Active."
        arguments:
          - name: "pool_id"
            help: "The storage pool id."
            dest: pool_id
            type: str
      - name: disable
        help: "Sets a storage pool's status to Inactive."
        arguments:
          - name: "pool_id"
            help: "The storage pool id."
            dest: pool_id
            type: str
      - name: get-capacity
        help: "Gets a storage pool's capacity."
        arguments:
          - name: "pool_id"
            help: "The storage pool id."
            dest: pool_id
            type: str
      - name: get-io-stats
        help: "Gets a storage pool's I/O statistics."
        arguments:
          - name: "pool_id"
            help: "The storage pool id."
            dest: pool_id
            type: str
          - name: "--history"
            help: "(XXdYYh), list history records (one for every 15 minutes) for XX days and YY hours (up to 10 days in total)."
            dest: history
            type: str
          - name: "--records"
            help: "The number of records. Default: `20`."
            dest: records
            type: int
            default: 20
      - name: add-host
        help: "Add an allowed host NQN to a storage pool."
        arguments:
          - name: "pool_id"
            help: "The storage pool id."
            dest: pool_id
            type: str
          - name: "host_nqn"
            help: "The host NQN to allow access."
            dest: host_nqn
            type: str
      - name: remove-host
        help: "Remove an allowed host NQN from a storage pool."
        arguments:
          - name: "pool_id"
            help: "The storage pool id."
            dest: pool_id
            type: str
          - name: "host_nqn"
            help: "The host NQN to remove."
            dest: host_nqn
            type: str
