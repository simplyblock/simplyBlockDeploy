            dest: distr_bs
            type: int
            default: 4096
            private: true
          - name: "--distr-chunk-bs"
            help: "The (Dev) distrb bdev chunk block size. Default: `4096`."
            dest: distr_chunk_bs
            type: int
            default: 4096
            private: true
          - name: "--ha-type"
            help: "Logical volume HA type (single, ha), default is cluster single type. Default: `ha`."
            dest: ha_type
            type: str
            choices:
              - single
              - ha
            default: ha
          - name: "--enable-node-affinity"
            help: "Enables node affinity for storage nodes."
