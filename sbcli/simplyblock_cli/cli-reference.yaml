          - name: "--ha-type"
            help: "Logical volume HA type (single, ha), default is cluster ha type. Default: `ha`."
            dest: ha_type
            type: str
            choices:
              - single
              - ha
            default: ha
          - name: "--is-single-node"
            help: "For single-node clusters only. Default: `false`."
