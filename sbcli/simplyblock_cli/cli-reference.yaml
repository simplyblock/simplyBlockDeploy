          - name: "--pool-max"
            help: "Pool maximum size: 20M, 20G."
            dest: pool_max
            type: size
          - name: "--lvol-max"
            help: "Logical volume maximum size: 20M, 20G."
            dest: lvol_max
            type: size
          - name: "--max-rw-iops"
            help: "Maximum Read Write IO Per Second."
            dest: max_rw_iops
            type: int
          - name: "--max-rw-mbytes"
            help: "Maximum Read Write Megabytes Per Second."
            dest: max_rw_mbytes
            type: int
          - name: "--max-r-mbytes"
            help: "Maximum Read Megabytes Per Second."
            dest: max_r_mbytes
            type: int
          - name: "--max-w-mbytes"
            help: "Maximum Write Megabytes Per Second."
            dest: max_w_mbytes
