name: Docker Helm Deployer Build

on:
  workflow_dispatch:
    inputs:
      helm_charts_tag:
        description: "helm-charts tag or branch to clone"
        required: true
        type: string
      push_to_quay:
        description: "Push to quay.io"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@master

      - name: Login to Quay.io
        uses: docker/login-action@v3
        if: ${{ inputs.push_to_quay == true }}
        with:
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
          registry: quay.io

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: hamdysimplyblock
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        run: |
          docker buildx create --name mybuilder --bootstrap --use
          TAG=$(echo "${{ github.event.inputs.helm_charts_tag }}" | sed 's/\//-/g')
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg HELM_CHARTS_TAG="${{ github.event.inputs.helm_charts_tag }}" \
            -t simplyblock/helm-deployer:$TAG \
            -f docker/Dockerfile.helm-deployer \
            . --push
          echo "::notice title=Docker.com::simplyblock/helm-deployer:$TAG"

          if [ "${{ inputs.push_to_quay }}" == "true" ]; then
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --build-arg HELM_CHARTS_TAG="${{ github.event.inputs.helm_charts_tag }}" \
              -t quay.io/simplyblock-io/helm-deployer:$TAG \
              -f docker/Dockerfile.helm-deployer \
              . --push
            echo "::notice title=Quay.io::quay.io/simplyblock-io/helm-deployer:$TAG"
          fi