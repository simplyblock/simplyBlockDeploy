name: E2E Scheduler

# Runs 4 e2e-bootstrap variants daily (sequentially) unless a stress run is active.
# Run 1: R25.10-Hotfix  ndcs=1 npcs=1  storage: .201-.203
# Run 2: R25.10-Hotfix  ndcs=2 npcs=2  storage: .201-.204
# Run 3: main           ndcs=1 npcs=1  storage: .201-.203
# Run 4: main           ndcs=2 npcs=2  storage: .201-.204
#
# Infrastructure defaults not listed here are defined in e2e-bootstrap.yml.

on:
  schedule:
    - cron: '30 18 * * *'   # daily at 12:00 AM IST (18:30 UTC)
  workflow_dispatch:       # allow manual trigger for testing

# Only one scheduler run at a time.
# cancel-in-progress: true means re-triggering the scheduler (manually or via
# schedule) will cancel the currently running one — useful as a kill switch.
concurrency:
  group: simplyblock-lab-e2e-scheduler
  cancel-in-progress: true

jobs:
  # ============================================================
  # GUARD: skip all runs if a stress workflow is in progress
  # ============================================================
  check-stress:
    name: Check if stress run is active
    runs-on: [self-hosted]
    outputs:
      stress_running: ${{ steps.check.outputs.stress_running }}
    steps:
      - name: Check for in-progress stress runs
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # IMPORTANT: do NOT use '|| echo 0' — if gh fails we must fail-safe
          # (assume stress is running) rather than silently proceeding.
          # Also check all non-completed statuses, not just in_progress.
          set +e

          stress_running=false
          for wf in stress-run-bootstrap.yml stress-run-only.yml; do
            echo "--- checking $wf ---"

            gh_out=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "$wf" \
              --json status,databaseId 2>&1)
            gh_exit=$?

            echo "gh exit=$gh_exit output=$gh_out"

            if [[ $gh_exit -ne 0 ]]; then
              echo "ERROR: gh run list failed for $wf — failing safe, assuming stress may be active."
              stress_running=true
              break
            fi

            count=$(echo "$gh_out" \
              | jq '[.[] | select(.status != "completed")] | length' 2>/dev/null)
            jq_exit=$?

            if [[ $jq_exit -ne 0 || -z "$count" ]]; then
              echo "ERROR: jq failed (exit=$jq_exit, count='$count') — failing safe."
              stress_running=true
              break
            fi

            echo "$wf: $count active (non-completed) run(s)"
            if [[ "$count" -gt 0 ]]; then
              stress_running=true
              break
            fi
          done

          echo "stress_running=${stress_running}" >> "$GITHUB_OUTPUT"
          if [[ "${stress_running}" == "true" ]]; then
            echo "Stress run active — skipping all scheduled e2e runs."
          else
            echo "No stress run active — proceeding."
          fi

  # ============================================================
  # RUN 1 — R25.10-Hotfix | ndcs=1 npcs=1 | 3 storage nodes
  # ============================================================
  e2e-run-1:
    name: "E2E R25.10-Hotfix 1+1"
    needs: check-stress
    if: needs.check-stress.outputs.stress_running != 'true'
    uses: ./.github/workflows/e2e-bootstrap.yml
    secrets: inherit
    with:
      SBCLI_BRANCH:            "R25.10-Hotfix"
      STORAGE_PRIVATE_IPS:     "192.168.10.201 192.168.10.202 192.168.10.203"
      MNODES:                  "192.168.10.210"
      API_INVOKE_URL:          "http://192.168.10.210/"
      BASTION_IP:              "192.168.10.210"
      GRAFANA_ENDPOINT:        "http://192.168.10.210/grafana"
      BOOTSTRAP_DATA_CHUNKS:   "1"
      BOOTSTRAP_PARITY_CHUNKS: "1"
      BOOTSTRAP_HA_JM_COUNT:   "4"
      BOOTSTRAP_JOURNAL_PARTITION: "1"
      RUN_LABEL:               "run1"

  # ============================================================
  # RUN 2 — R25.10-Hotfix | ndcs=2 npcs=2 | 4 storage nodes
  # ============================================================
  e2e-run-2:
    name: "E2E R25.10-Hotfix 2+2"
    needs: [check-stress, e2e-run-1]
    if: always() && !cancelled() && needs.check-stress.outputs.stress_running != 'true' && needs.e2e-run-1.result != 'skipped'
    uses: ./.github/workflows/e2e-bootstrap.yml
    secrets: inherit
    with:
      SBCLI_BRANCH:            "R25.10-Hotfix"
      STORAGE_PRIVATE_IPS:     "192.168.10.201 192.168.10.202 192.168.10.203 192.168.10.204"
      MNODES:                  "192.168.10.210"
      API_INVOKE_URL:          "http://192.168.10.210/"
      BASTION_IP:              "192.168.10.210"
      GRAFANA_ENDPOINT:        "http://192.168.10.210/grafana"
      BOOTSTRAP_DATA_CHUNKS:   "2"
      BOOTSTRAP_PARITY_CHUNKS: "2"
      BOOTSTRAP_HA_JM_COUNT:   "4"
      BOOTSTRAP_JOURNAL_PARTITION: "1"
      RUN_LABEL:               "run2"

  # ============================================================
  # RUN 3 — main | ndcs=1 npcs=1 | 3 storage nodes
  # ============================================================
  e2e-run-3:
    name: "E2E main 1+1"
    needs: [check-stress, e2e-run-2]
    if: always() && !cancelled() && needs.check-stress.outputs.stress_running != 'true' && needs.e2e-run-2.result != 'skipped'
    uses: ./.github/workflows/e2e-bootstrap.yml
    secrets: inherit
    with:
      SBCLI_BRANCH:            "main"
      STORAGE_PRIVATE_IPS:     "192.168.10.201 192.168.10.202 192.168.10.203"
      MNODES:                  "192.168.10.210"
      API_INVOKE_URL:          "http://192.168.10.210/"
      BASTION_IP:              "192.168.10.210"
      GRAFANA_ENDPOINT:        "http://192.168.10.210/grafana"
      BOOTSTRAP_DATA_CHUNKS:   "1"
      BOOTSTRAP_PARITY_CHUNKS: "1"
      BOOTSTRAP_HA_JM_COUNT:   "4"
      BOOTSTRAP_JOURNAL_PARTITION: "1"
      RUN_LABEL:               "run3"

  # ============================================================
  # RUN 4 — main | ndcs=2 npcs=2 | 4 storage nodes
  # ============================================================
  e2e-run-4:
    name: "E2E main 2+2"
    needs: [check-stress, e2e-run-3]
    if: always() && !cancelled() && needs.check-stress.outputs.stress_running != 'true' && needs.e2e-run-3.result != 'skipped'
    uses: ./.github/workflows/e2e-bootstrap.yml
    secrets: inherit
    with:
      SBCLI_BRANCH:            "main"
      STORAGE_PRIVATE_IPS:     "192.168.10.201 192.168.10.202 192.168.10.203 192.168.10.204"
      MNODES:                  "192.168.10.210"
      API_INVOKE_URL:          "http://192.168.10.210/"
      BASTION_IP:              "192.168.10.210"
      GRAFANA_ENDPOINT:        "http://192.168.10.210/grafana"
      BOOTSTRAP_DATA_CHUNKS:   "2"
      BOOTSTRAP_PARITY_CHUNKS: "2"
      BOOTSTRAP_HA_JM_COUNT:   "4"
      BOOTSTRAP_JOURNAL_PARTITION: "1"
      RUN_LABEL:               "run4"
